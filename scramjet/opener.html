<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
    </style>
</head>
<body>

    <button id="open-portal-btn" style='width: 100%; height: 100%'>Open Portal</button>

    <script>
        // Service worker code, served back via the /get-dynamic-sw.js loopback.
        // Kept identical to the block in index.html.
        const swCode = `
importScripts("https://altior-portal2.onrender.com/scram/scramjet.all.js");

const { ScramjetServiceWorker } = $scramjetLoadWorker();
const scramjet = new ScramjetServiceWorker();

async function handleRequest(event) {
    await scramjet.loadConfig();
    if (scramjet.route(event)) {
        return scramjet.fetch(event);
    }
    return fetch(event.request);
}

self.addEventListener("fetch", (event) => {
    event.respondWith(handleRequest(event));
});
`;

        document.getElementById('open-portal-btn').addEventListener('click', async () => {
            // Register the service worker HERE, on the real origin. An about:blank
            // window cannot register a SW itself, but — exactly like the popups
            // that index.html opens — it inherits this page's origin, active SW
            // and base URL, so scramjet's relative frame URLs (/scramjet/...) and
            // the SW interception both resolve against the real origin.
            //
            // NOTE: this requires opener.html to be served from the same origin
            // as the portal (altior-portal2.onrender.com). The popup inherits
            // whatever origin THIS page has.
            if ('serviceWorker' in navigator) {
                try {
                    await navigator.serviceWorker.register(`/get-dynamic-sw.js?code=${encodeURIComponent(swCode)}`);
                    // Wait until the SW is actually active before opening the
                    // popup, so the first scramjet frame load is intercepted.
                    await navigator.serviceWorker.ready;
                } catch (err) {
                    console.error('Service Worker registration failed:', err);
                }
            }

            const popupWin = window.open('about:blank', '_blank');

            if (!popupWin) {
                alert('Popup blocked! Please allow popups for this site.');
                return;
            }

            const content = await fetch('https://raw.githubusercontent.com/ltorl/altior-portal2/refs/heads/main/scramjet/index.html').then(r => r.text());

            popupWin.document.open();
            popupWin.document.write(content);
            popupWin.document.close();
        });
    </script>

</body>
</html>
