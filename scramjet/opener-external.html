<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { border: 0; width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <!--
        CROSS-ORIGIN opener. May be hosted on ANY origin (a different domain,
        a local file, a school site, etc.). It is NOT served from the render
        origin.

        Why it still uses raw HTML and not a portal-in-an-iframe:

          A service worker can only be registered by a document that is
          same-origin with the SW script. Scramjet cannot proxy anything
          without that SW. So the registration MUST happen on
          altior-portal2.onrender.com -- a foreign-origin page, or an
          about:blank window that inherited a foreign origin, physically
          cannot do it.

          The spec detail that saves us: window.open() makes a popup whose
          initial about:blank inherits the origin of the FRAME THAT CALLED IT,
          not the top page. So we load the render-origin opener.html inside a
          small launcher iframe below. When the user clicks the button (which
          lives inside that render-origin iframe), opener.html runs ON the
          render origin and:
            1. registers the service worker, then
            2. window.open('about:blank') -- the popup inherits the RENDER
               origin -- and writes the portal's RAW HTML into it.

          Result: the actual browsing happens in a cloaked, top-level
          about:blank window containing the raw portal HTML, with a working
          SW and correctly-resolving /scramjet/... URLs. The iframe here is
          only a launcher button; it never holds the portal or the proxied
          pages.
    -->
    <iframe
        src="https://altior-portal2.onrender.com/opener.html"
        referrerpolicy="no-referrer">
    </iframe>

</body>
</html>
