        :root {
            --glow-color: rgba(0, 195, 255, 0.6);

        body {

            overflow: hidden;
            color: #fff;
        }

        #search-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }

        #search-container.active-mode {
            top: 0;
            transform: translate(-50%, 0);
            padding: 15px 0;
            flex-direction: row;
            justify-content: space-between;
            background: rgba(11, 12, 16, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            gap: 0;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--glow-color);
            margin: 0;
            transition: all 0.6s ease;
            cursor: default;
        }

        #search-container.active-mode .title {
            font-size: 1.5rem;
            margin-left: 30px;
            text-shadow: 0 0 10px rgba(69, 162, 158, 0.5);
            color: var(--accent-glow);
        }

        .input-group {
            display: flex;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: rgba(0, 195, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 195, 255, 0.15);
        }

        #search-container.active-mode .input-group {
            width: 50%;
            margin-right: 30px;
            max-width: 800px;
            padding: 4px;
        }

        #url-input {
            flex-grow: 1;
            padding: 14px 20px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        #url-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        button {
            padding: 12px 28px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: var(--accent-color);
            color: #0b0c10;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--accent-glow);
            box-shadow: 0 0 25px rgba(102, 252, 241, 0.5);
            transform: scale(1.02);
        }

        .quick-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .quick-link {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px);
            padding: 16px 18px;
            border-radius: 40px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            text-align: center;
            display: block;
            width: 220px;
        }

        .quick-link:hover {
            background: var(--accent-color);

            border-color: var(--accent-glow);

            text-align: center;
            display: block;

            color: #0b0c10;
            transform: translateY(-2px);
            border-color: var(--accent-glow);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);

            gap: 1rem;
            margin-top: 1rem;

        @media (max-width: 860px) {
            .games-grid {

        @media (max-width: 540px) {

            }

            top: 50%;
            transform: translateY(-50%);
            background: #703232;
            border-radius: 4px;
            padding: 2px 6px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            height: 20px;
        }

        .delete-saved:hover {
            background: #aa0000;
            transform: translateY(-50%) scale(1.05);
        }

</head>

    await scramjet.loadConfig();
    if (scramjet.route(event)) {
        return scramjet.fetch(event);
    }
    return fetch(event.request);
}

self.addEventListener("fetch", (event) => {
    event.respondWith(handleRequest(event));
});
`;

        async function waitForServiceWorker() {
            if (!('serviceWorker' in navigator)) return;
            try {
                const registration = await navigator.serviceWorker.register(`/get-dynamic-sw.js?code=${encodeURIComponent(swCode)}`);
                if (registration.active) return;
                if (registration.waiting) {
                    registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                }
                await new Promise(resolve => {
                    const check = () => {
                        if (registration.active) resolve();
                        else setTimeout(check, 100);
                    };
                    check();
                });

                // are controlled regardless. Just proceed.
                console.warn('Skipping SW registration (running under about:blank?):', err);

        </body>
        </html>
    `;

            popupWin.document.open();
            popupWin.document.write(popupHtml);
            popupWin.document.close();

            input.value = '';
        }

        button.addEventListener('click', () => navigate(input.value));
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigate(input.value);
        });

        window.navigate = navigate;

        let savedSites = [];

        function loadSavedSites() {
            const stored = localStorage.getItem('altior_saved_sites');
            if (stored) {
                try {
                    savedSites = JSON.parse(stored);
                    renderSavedSites();
                } catch (e) {
                    console.error('Failed to load saved sites:', e);
                }
            }
        }

        function renderSavedSites() {
            const savedGrid = document.getElementById('saved-grid');
            const savedSection = document.getElementById('saved-section');
            if (!savedGrid || !savedSection) return;

            if (savedSites.length === 0) {
                savedSection.hidden = true;
            } else {
                savedSection.hidden = false;
                savedGrid.innerHTML = savedSites.map((site, index) => `
            <div class="saved-link saved-site-item" data-url="${escapeHtml(site.url)}" data-index="${index}">
                ${escapeHtml(site.title || site.url)}
                <span class="delete-saved" data-index="${index}">✖</span>
            </div>
        `).join('');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function fetchPageTitle(url) {
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();

                if (data && data.contents) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(data.contents, 'text/html');
                    const title = doc.querySelector('title');
                    if (title && title.textContent) {
                        try {
                            const pageTitle = title.textContent.replace(' at DuckDuckGo', ' - Search').trim();
                            return pageTitle;
                        } catch (error) {
                            return title.textContent.trim();
                        }
                    }
                }
                try {
                    const urlObj = new URL(url);
                    urlObj = urlObj.hostname.replace('https://', '');
                    return urlObj.hostname.replace('www.', '');
                } catch (e) {
                    return 'Saved Site';
                }
            } catch (error) {
                console.error('Error fetching title:', error);
                try {
                    const urlObj = new URL(url);
                    return urlObj.hostname.replace('www.', '');
                } catch (e) {
                    return 'Saved Site';
                }
            }
        }

        async function saveCurrentSite() {
            const urlInput = document.getElementById('url-input');
            const errorDiv = document.getElementById('error-message');
            const saveBtn = document.getElementById('save-site-btn');

            let url = urlInput.value.trim();

            if (!url) {
                errorDiv.textContent = 'Please enter a URL to save';
                errorDiv.style.display = 'block';
                setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://duckduckgo.com/?q=' + url;
            }

            try {
                new URL(url);
            } catch (e) {
                errorDiv.textContent = 'Please enter a valid URL';
                errorDiv.style.display = 'block';
                setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
                return;
            }

            if (savedSites.some(site => site.url === url)) {
                errorDiv.textContent = 'This site is already saved!';
                errorDiv.style.display = 'block';
                setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
                return;
            }

            const originalBtnText = saveBtn.textContent;
            saveBtn.textContent = 'Loading...';
            saveBtn.disabled = true;
            errorDiv.style.display = 'none';

            try {
                const title = await fetchPageTitle(url);
                savedSites.push({ url, title });
                localStorage.setItem('altior_saved_sites', JSON.stringify(savedSites));
                renderSavedSites();
            } catch (error) {
                errorDiv.textContent = 'Failed to save site. Please try again.';
                errorDiv.style.display = 'block';
                setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
            } finally {
                saveBtn.textContent = originalBtnText;
                saveBtn.disabled = false;
            }
        }

        function setupDelegatedEvents() {
            const container = document.getElementById('search-container');
            if (!container) return;

            container.addEventListener('click', (e) => {
                const deleteBtn = e.target.closest('.delete-saved');
                if (deleteBtn) {
                    e.stopPropagation();
                    const index = deleteBtn.getAttribute('data-index');
                    if (index !== null) {
                        savedSites.splice(parseInt(index), 1);
                        localStorage.setItem('altior_saved_sites', JSON.stringify(savedSites));
                        renderSavedSites();
                    }
                    return;
                }

                const link = e.target.closest('.quick-link, .saved-link');
                if (link) {
                    const url = link.getAttribute('data-url');
                    if (url) navigate(url);
                }
            });
        }

        const style = document.createElement('style');
        style.textContent = `
            #save-site-btn:hover {
                background: #5a6268 !important;
                box-shadow: 0 0 15px rgba(108, 117, 125, 0.5);
                transform: scale(1.02);
            }
            #save-site-btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
            .saved-link {
                cursor: pointer;
            }
        `;
        document.head.appendChild(style);

        document.addEventListener('DOMContentLoaded', () => {
            loadSavedSites();
            setupDelegatedEvents();

            const saveBtn = document.getElementById('save-site-btn');
            if (saveBtn) {
                saveBtn.addEventListener('click', saveCurrentSite);
            }

            const urlInput = document.getElementById('url-input');
            if (urlInput) {
                urlInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const goBtn = document.getElementById('go-btn');
                        if (goBtn) goBtn.click();
                    }
                });
            }
        });

        initScramjet();
    </script>
</body>

</html>
